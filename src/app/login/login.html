<div class="auth-container">
  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <input type="text" id="username" placeholder="Username" formControlName="username">
    <div class="error" *ngIf="loginForm.controls.username.invalid && loginForm.controls.username.touched">
      Username must be at least 3 characters
    </div>

    <input type="password" id="password" placeholder="Password" formControlName="password">
    <div class="error" *ngIf="loginForm.controls.password.invalid && loginForm.controls.password.touched">
      Password is required
    </div>
 
    <div class="error" *ngIf="loginFailed">
      invalid. Please try again.
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Login</button>

    <p class="account">Don't have an account?
      <a routerLink="/signup" class="signup">Sign Up</a>
    </p>
  </form>
</div>
